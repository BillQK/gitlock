name: CLI Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18.4"
          otp-version: "27"

      - name: Install dependencies
        run: mix deps.get

      - name: Test only CLI and Core (no database needed)
        run: |
          cd apps/gitlock_cli && mix test
          cd ../gitlock_core && mix test

      - name: Build escript
        run: |
          MIX_ENV=prod mix escript.build
          chmod +x bin/gitlock

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: bin/gitlock
          body: |
            ## Gitlock ${{ github.ref_name }}

            Forensic code analysis tool for Git repositories.

            ### Installation
            ```bash
            curl -L ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/gitlock -o gitlock
            chmod +x gitlock
            sudo mv gitlock /usr/local/bin/
            ```

            ### Usage
            ```bash
            gitlock --help
            gitlock hotspots --repo . --dir .
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
