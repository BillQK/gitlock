# fly.toml app configuration file generated for gitlock on 2025-06-07T17:47:51-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'gitlock'
primary_region = 'bos'

[build]
  dockerfile = 'Dockerfile'

[env]
  MIX_ENV = 'prod'
  PHX_SERVER = 'true'
  PORT = '4000'

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
